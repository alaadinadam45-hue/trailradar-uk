<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trial Radar UK | رادار تجارب كرة القدم</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ستايل سريع للتأكد من ظهور الجدول بشكل جميل */
        body { font-family: sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .table-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: right; }
        th { background-color: #2c3e50; color: white; }
        .status-badge { background: #27ae60; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        .apply-btn { background: #2980b9; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; display: inline-block; }
        .apply-btn:hover { background: #3498db; }
    </style>
</head>
<body>

    <h1>🚀 Trial Radar UK</h1>
    <p>آخر تجارب الأداء المكتشفة في بريطانيا</p>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>المصدر / النادي</th>
                    <th>الفئة</th>
                    <th>الحالة</th>
                    <th>الرابط</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4">جاري تحميل أحدث التجارب...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // الكود المسؤول عن جلب البيانات من ملف البوت
        async function loadTrials() {
            try {
                // البوت بيحفظ البيانات في هذا الملف
                const response = await fetch('trials_data.json');
                const data = await response.json();
                const tableBody = document.getElementById('tableBody');
                
                tableBody.innerHTML = ''; // مسح رسالة التحميل

                data.forEach(item => {
                    const row = `
                        <tr>
                            <td><b>${item.club}</b></td>
                            <td>${item.category}</td>
                            <td><span class="status-badge">${item.status}</span></td>
                            <td><a href="${item.link}" target="_blank" class="apply-btn">فتح الرابط</a></td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error loading JSON:", error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="4">لا توجد بيانات حالياً. شغل البوت وارفع الملف لـ GitHub.</td></tr>';
            }
        }

        // تشغيل الوظيفة فور فتح الصفحة
        window.onload = loadTrials;
    </script>
</body>
</html>
